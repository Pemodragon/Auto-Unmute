<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Mute Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --red: #ff2d2d;
      --green: #00e676;
      --yellow: #ffe600;
      --text: #f0f0f0;
      --muted-text: #555;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 28px;
      height: 28px;
      background: var(--red);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg {
      width: 14px;
      height: 14px;
      fill: white;
    }

    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
    }

    .header-text p {
      font-size: 9px;
      color: var(--muted-text);
      margin-top: 2px;
      letter-spacing: 0.08em;
    }

    .main {
      padding: 20px 18px;
    }

    /* Status card */
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .status-card.muted { border-color: var(--red); }
    .status-card.unmuted { border-color: var(--green); }
    .status-card.no-video { border-color: var(--yellow); }

    .status-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.04;
      border-radius: 10px;
      transition: background 0.3s;
    }
    .status-card.muted::before { background: var(--red); }
    .status-card.unmuted::before { background: var(--green); }
    .status-card.no-video::before { background: var(--yellow); }

    .status-icon {
      font-size: 36px;
      line-height: 1;
      margin-bottom: 10px;
      display: block;
    }

    .status-label {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
      transition: color 0.3s;
    }

    .status-card.muted .status-label { color: var(--red); }
    .status-card.unmuted .status-label { color: var(--green); }
    .status-card.no-video .status-label { color: var(--yellow); }

    .status-sub {
      font-size: 10px;
      color: var(--muted-text);
      margin-top: 4px;
      letter-spacing: 0.06em;
    }

    /* Details rows */
    .details {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 10px;
    }

    .detail-key {
      color: var(--muted-text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .detail-val {
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .detail-val.true { color: var(--red); }
    .detail-val.false { color: var(--green); }

    /* Volume bar */
    .volume-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .volume-bar {
      width: 70px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .volume-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Video title */
    .video-title {
      margin-top: 14px;
      font-size: 9px;
      color: var(--muted-text);
      line-height: 1.5;
      letter-spacing: 0.03em;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Refresh button */
    .unmute-btn {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      background: var(--green);
      border: none;
      border-radius: 6px;
      color: #000;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .unmute-btn:hover {
      background: #33ff8a;
      transform: translateY(-1px);
    }

    .refresh-btn {
      margin-top: 8px;
      width: 100%;
      padding: 9px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted-text);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }

    /* Not on YouTube message */
    .not-yt {
      text-align: center;
      padding: 30px 18px;
    }

    .not-yt .icon { font-size: 32px; margin-bottom: 10px; }
    .not-yt h2 {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: var(--yellow);
      margin-bottom: 6px;
    }
    .not-yt p { font-size: 10px; color: var(--muted-text); line-height: 1.6; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 30px;
      font-size: 11px;
      color: var(--muted-text);
      letter-spacing: 0.1em;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .loading { animation: pulse 1.2s ease infinite; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-2.72 12.31 12.31 0 0 0-7.65 1.27 4.84 4.84 0 0 1-3.73 8.54A4.84 4.84 0 0 1 2 12a12.3 12.3 0 0 0 4.45 9.4 4.82 4.82 0 0 1 6.1 0A12.3 12.3 0 0 0 17 12a12.4 12.4 0 0 0-.26-2.55A4.84 4.84 0 0 1 19.59 6.69zM12 16l-4-4 4-4z"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>YT Mute Checker</h1>
    <p>VIDEO AUDIO DIAGNOSTIC</p>
  </div>
</div>

<div id="content">
  <div class="loading">CHECKING...</div>
</div>

<script src="popup.js"></script>
</body>
</html>
